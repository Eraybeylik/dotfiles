# #######################################################################################
# HYPRLAND CONFIGURATION FILE
# #######################################################################################

################
### MONITORS ###
################

monitor = HDMI-A-1, 1600x900@60, 0x0, 1
monitor = eDP-1, 1920x1080@144, 1600x0, 1
monitor = , preferred, auto, 1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = tofi-drun -c ~/.config/tofi/configA --drun-launch=true
$browser = google-chrome-stable --enable-features=UseOzonePlatform --ozone-platform=wayland
$notes = obsidian
$editor = code
$editor-alt = subl
$colorPicker = hyprpicker


#################
### AUTOSTART ###
#################

exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/bin/dunst
exec-once = waybar
exec-once = swww-daemon
exec-once = swww img ~/Pictures/Wallpapers/Penguen.png  --transition-fps 255 --transition-type outer --transition-duration 0.8
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = xdg-user-dirs-update
exec-once = blueman-applet

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# QT
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_STYLE_OVERRIDE,kvantum

# Toolkit Backend Variables
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# XDG Specifications
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    
    # Tek renkli, dönen ışık yok
    col.active_border = rgb(89b4fa)
    col.inactive_border = rgb(3b3b3b)
    
    resize_on_border = true 
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    blur {
        enabled = true
        size = 3
        passes = 3
        vibrancy = 0.1696
        ignore_opacity = true
    }
}

animations {
    enabled = true
    
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 8, wind
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc { 
    force_default_wallpaper = 0
    disable_hyprland_logo = true 
    disable_splash_rendering = true
    vrr = 0
}

cursor {
    no_hardware_cursors = true
}

#############
### INPUT ###
#############

input {
    kb_layout = tr
    follow_mouse = 1
    sensitivity = 0.5
    
    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, scale: 0.25, workspace


device {
    name = glorious-model-o-wireless
    sensitivity = -0.5
}


####################
### KEYBINDINGS ###
####################

source = ~/.config/hypr/keybinds.conf

#############################
### WINDOWS AND WORKSPACES ###
##############################

# Float rules - YENİ SYNTAX
windowrule {
    name = float-jome
    match:title = ^(jome)$
    float = on
}

windowrule {
    name = float-kvantum
    match:class = ^(kvantummanager)$
    float = on
}

windowrule {
    name = float-qt5ct
    match:class = ^(qt5ct)$
    float = on
}

windowrule {
    name = float-qt6ct
    match:class = ^(qt6ct)$
    float = on
}

windowrule {
    name = float-nwg-look
    match:class = ^(nwg-look)$
    float = on
}

windowrule {
    name = float-ark
    match:class = ^(org.kde.ark)$
    float = on
}

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = on
}

windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = on
}

windowrule {
    name = float-nm-applet
    match:class = ^(nm-applet)$
    float = on
}

windowrule {
    name = float-nm-editor
    match:class = ^(nm-connection-editor)$
    float = on
}

windowrule {
    name = float-polkit
    match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
    float = on
}

# Opacity rules - YENİ SYNTAX
windowrule {
    name = opacity-thorium
    match:class = ^(Thorium-browser)$
    opacity = 0.90 0.90
}

windowrule {
    name = opacity-code
    match:class = ^(Code)$
    opacity = 0.80 0.80
}

windowrule {
    name = opacity-arduino
    match:class = ^(Arduino IDE)$
    opacity = 0.80 0.80
}

windowrule {
    name = opacity-warp
    match:class = ^(dev.warp.Warp)$
    opacity = 0.80 0.80
}

windowrule {
    name = opacity-obsidian
    match:class = ^(obsidian)$
    opacity = 0.80 0.80
}

windowrule {
    name = opacity-kitty
    match:class = ^(kitty)$
    opacity = 0.80 0.80
}

windowrule {
    name = opacity-nautilus
    match:class = ^(org.gnome.Nautilus)$
    opacity = 0.80 0.80
}

windowrule {
    name = opacity-ark
    match:class = ^(org.kde.ark)$
    opacity = 0.80 0.80
}


# Layer rules
layerrule {
    name = tofi-ignorezero
    match:namespace = tofi
    ignore_alpha = 0
}

layerrule {
    name = dunst-ignorezero
    match:namespace = dunst
    ignore_alpha = 0
}

layerrule {
    name = dunst-blur
    match:namespace = dunst
    blur = on
}


