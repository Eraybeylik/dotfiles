# Sourcing maugen colors
source = $HOME/.config/hypr/hyprlock/matugen/matugen-hyprlock.conf

$text_color = $on_surface
$entry_background_color = $surface_alpha
$entry_border_color = $tertiary
$entry_color = $on_surface
$font_family = JetBrainsMono Nerd Font
$font_family_clock = Iosevka Nerd Font Mono
$font_symbols = JetBrainsMono Nerd Font

background {
    # color = $surface
    path = $image
    blur_size = 15
    blur_passes = 4
}

input-field {
    monitor =
    size = 250, 50
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = true

    position = 0, 20
    halign = center
    valign = center
}

label { # Caps Lock Warning
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = 0, -25
    halign = center
    valign = center
}


label { # Clock
    monitor =
    text = $TIME
    color = $text_color
    font_size = 65
    font_family = $font_family_clock

    position = 0, 300
    halign = center
    valign = center
}
label { # Date
    monitor =
    text = cmd[update:5000] date +"%A, %B %d"
    color = $text_color
    font_size = 17
    font_family = $font_family

    position = 0, 240
    halign = center
    valign = center
}

label { # User
    monitor =
    text =  $USER 
    color = $text_color
    font_size = 20
    font_family = $font_symbols
    position = 0, 50
    halign = center
    valign = bottom
}

label { # Status
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $text_color
    font_size = 14
    font_family = $font_family

    position = 30, -30
    halign = left
    valign = top
}
