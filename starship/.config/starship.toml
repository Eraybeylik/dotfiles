"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000
palette = 'catppuccin_mocha'
add_newline = false

# ===== PROMPT FORMAT =====
format = """
[󰣇 ](bold blue)\
$username\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$php\
$docker_context\
$line_break\
$character"""

# ===== CHARACTER =====
[character]
success_symbol = "[❯](peach)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](lavender)"
vimcmd_visual_symbol = "[❮](yellow)"
vimcmd_replace_symbol = "[❮](mauve)"

# ===== USERNAME =====
[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = true

# ===== HOSTNAME (Disabled) =====
[hostname]
disabled = true

# ===== DIRECTORY =====
[directory]
read_only = " 󰌾"
truncation_length = 3
truncate_to_repo = true
style = "bold lavender"
format = "in [$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~" = "~"

# ===== GIT =====
[git_branch]
symbol = " "
style = "bold mauve"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "🏳 "
ahead = "⇡${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
behind = "⇣${count} "
untracked = "?${count} "
stashed = "📦 "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[git_commit]
tag_symbol = " "
commit_hash_length = 7

# ===== PROGRAMMING LANGUAGES =====
[python]
symbol = " "
style = "bold yellow"
format = "via [$symbol$version]($style) "

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol$version]($style) "

[rust]
symbol = "󱘗 "
style = "bold red"
format = "via [$symbol$version]($style) "

[golang]
symbol = " "
style = "bold cyan"
format = "via [$symbol$version]($style) "

[java]
symbol = " "
style = "bold red"
format = "via [$symbol$version]($style) "

[kotlin]
