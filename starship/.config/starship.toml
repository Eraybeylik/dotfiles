style = "bold blue"
format = "via [$symbol$version]($style) "

# ===== DOCKER =====
[docker_context]
symbol = " "
style = "bold blue"
format = "via [$symbol$context]($style) "
only_with_files = true

# ===== AWS =====
[aws]
symbol = "  "
style = "bold yellow"
format = "on [$symbol$profile]($style) "

# ===== PACKAGE =====
[package]
symbol = "󰏗 "
style = "bold cyan"
format = "is [$symbol$version]($style) "

